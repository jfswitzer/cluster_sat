apiVersion: v1
kind: Namespace
metadata:
  name: container-registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: container-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
      - name: registry
        image: registry:2
        ports:
        - containerPort: 5000
        env:
        - name: http://10.0.0.1:30500
          value: :5000
        # Optional: Persistent storage if you want images to survive a restart
        # volumeMounts:
        # - name: registry-data
        #   mountPath: /var/lib/registry
      # volumes:
      # - name: registry-data
      #   emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: registry-service
  namespace: container-registry
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
